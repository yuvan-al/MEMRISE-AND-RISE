<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Slang & Grammar Coach</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="login-container" class="container">
        <h2>Studio Login </h2>
        <p>Sign in or create an account to start your podcast session:</p>
        <div style="margin-top: 20px; display: flex; flex-direction: column; gap: 10px;">
            <input type="email" id="email-input" placeholder="Your Email">
            <input type="password" id="password-input" placeholder="Your Password">
            <div style="display: flex; gap: 10px; margin-top: 10px;">
                <button id="login-btn" style="flex: 1;">Sign In</button>
                <button id="signup-btn" style="flex: 1; background-color: #10b981;">Sign Up</button>
            </div>
        </div>
    </div>

    <div id="topic-container" class="container hidden">
        <h2>Welcome back! </h2>
        <p>Choose your practice topic:</p>
        <div class="topic-grid">
            <button class="topic-btn" onclick="selectTopic('Daily Routine & Habits')"> Daily Routine</button>
            <button class="topic-btn" onclick="selectTopic('Social Media & Gaming')"> Internet & Media</button>
            <button class="topic-btn" onclick="selectTopic('Work, Hustle & Productivity')"> Work & Productivity</button>
            <button class="topic-btn" onclick="selectTopic('Travel, Food & Shopping')"> Travel & Lifestyle</button>
        </div>
    </div>

    <div id="podcast-container" class="container hidden">
        <div class="podcast-header">
            <div>
                <h2 id="podcast-title">Live Slang Podcast</h2>
                <small id="active-topic" style="color: #64748b; font-weight: 600;"></small>
            </div>
            <div id="timer">02:00:00</div>
        </div>
        
        <div id="chat-window"></div>

        <div class="input-area">
            <input type="text" id="user-input" placeholder="Type your reply here...">
            <button id="send-btn">Talk</button>
        </div>

        <button id="end-btn" class="danger-btn">End Podcast & Get Summary</button>
    </div>

    <div id="summary-container" class="container hidden">
        <h2>Session Wrapped 🎧</h2>
        <p>Great session! Here are the expressions you worked on today:</p>
        <ul id="slang-summary-list"></ul>
        <button id="logout-btn">Log Out & Restart</button>
    </div>

    <div id="admin-vault" class="hidden">
        <h3>Master Key Settings</h3>
        <input type="password" id="master-key-input" placeholder="Paste your API key here">
        <button id="save-master-btn">Save Key</button>
    </div>

</body>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="script.js?v=13"></script>
</html>
